# Screenshot roster — source of truth for filenames, anchors, and doc links.
# Generate with: python tools/screenshots/generate.py
version: 1
output_dir: docs/screenshots
raw_base: https://raw.githubusercontent.com/NicholasTracy/ANSITerm

heroes:
  - id: basic
    file: hero-basic.png
    readme_anchor: screenshot-basic
    caption: Welcome screen with a button
    wiki_page: Example-Basic
  - id: advanced
    file: hero-advanced.png
    readme_anchor: screenshot-advanced
    caption: Table layout and Start Again control
    wiki_page: Example-Advanced
  - id: buttons
    file: hero-buttons.png
    readme_anchor: screenshot-buttons
    caption: Menu with Toggle LED highlighted
    wiki_page: Example-Buttons

examples:
  - id: basic
    example: BasicExample
    static: ex-basic-static.png
    motion: ex-basic-motion.gif
    wiki_page: Example-Basic
    wiki_anchor: screenshot-basic
    caption: Welcome screen with a clickable button.
  - id: advanced
    example: AdvancedExample
    static: ex-advanced-static.png
    motion: ex-advanced-motion.gif
    wiki_page: Example-Advanced
    wiki_anchor: screenshot-advanced
    caption: Tables, symbols, and a Start Again control.
  - id: buttons
    example: ButtonsExample
    static: ex-buttons-static.png
    motion: ex-buttons-motion.gif
    wiki_page: Example-Buttons
    wiki_anchor: screenshot-buttons
    caption: A small menu you can drive with the keyboard or mouse.
  - id: graphic
    example: GraphicExample
    static: ex-graphic-static.png
    motion: ex-graphic-motion.gif
    wiki_page: Example-Graphic
    wiki_anchor: screenshot-graphic
    caption: A tiny arena game using WASD keys.
  - id: ansfile
    example: ANSFileExample
    static: ex-ansfile-static.png
    motion: ex-ansfile-motion.gif
    wiki_page: Example-ANS-Files
    wiki_anchor: screenshot-ansfile
    caption: Browse `.ans` files from an SD card.
  - id: network
    example: NetworkTerminalExample
    static: ex-network-static.png
    motion: ex-network-motion.gif
    wiki_page: Example-Network-Terminal
    wiki_anchor: screenshot-network
    caption: The same kind of UI over a network connection.
  - id: esp
    example: ESPWiFiControlExample
    static: ex-esp-static.png
    motion: ex-esp-motion.gif
    wiki_page: Example-ESP-WiFi-Control
    wiki_anchor: screenshot-esp
    caption: Scan networks and connect from a terminal dashboard.
