name: Arduino CI

on:
  push:
    branches: [ master, main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ master, main ]

jobs:
  lint:
    name: Arduino Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint (Library Manager / strict)
        uses: arduino/arduino-lint-action@v2
        with:
          compliance: strict
          library-manager: submit

  build_avr:
    name: Compile AVR examples (${{ matrix.fqbn }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        fqbn:
          - arduino:avr:uno
          - arduino:avr:leonardo
          - arduino:avr:mega
    steps:
      - uses: actions/checkout@v4
      - name: Set up Arduino CLI
        uses: arduino/setup-arduino-cli@v2
        with:
          version: "1.x"
      - name: Install AVR core
        run: |
          arduino-cli core update-index
          arduino-cli core install arduino:avr
          arduino-cli lib install SD
      - name: Compile AVR-compatible examples
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r SKETCH; do
            if [[ ("${{ matrix.fqbn }}" == "arduino:avr:uno" || "${{ matrix.fqbn }}" == "arduino:avr:leonardo") && "${SKETCH}" == *"/ANSFileExample/"* ]]; then
              echo "==> Skipping ${SKETCH} for ${{ matrix.fqbn }} due to SRAM limits"
              continue
            fi
            echo "==> Building ${SKETCH} for ${{ matrix.fqbn }}"
            arduino-cli compile --fqbn "${{ matrix.fqbn }}" --library . "${SKETCH}"
          done < <(find examples -type f -name '*.ino' \
            ! -path '*/SSHExample/*' \
            ! -path '*/ESPWiFiControlExample/*' \
            | sort)

  build_esp_examples:
    name: Compile ESP examples (${{ matrix.fqbn }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        fqbn:
          - esp32:esp32:esp32
          - esp8266:esp8266:generic
    steps:
      - uses: actions/checkout@v4
      - name: Set up Arduino CLI
        uses: arduino/setup-arduino-cli@v2
        with:
          version: "1.x"
      - name: Install ESP core
        run: |
          if [[ "${{ matrix.fqbn }}" == esp32:* ]]; then
            arduino-cli core update-index --additional-urls https://espressif.github.io/arduino-esp32/package_esp32_index.json
            arduino-cli core install esp32:esp32 --additional-urls https://espressif.github.io/arduino-esp32/package_esp32_index.json
          else
            arduino-cli core update-index --additional-urls https://arduino.esp8266.com/stable/package_esp8266com_index.json
            arduino-cli core install esp8266:esp8266 --additional-urls https://arduino.esp8266.com/stable/package_esp8266com_index.json
          fi
      - name: Compile ESP-targeted examples
        shell: bash
        run: |
          set -euo pipefail
          for SKETCH in \
            examples/ESPWiFiControlExample/ESPWiFiControlExample.ino \
            examples/SSHExample/SSHExample.ino
          do
            echo "==> Building ${SKETCH} for ${{ matrix.fqbn }}"
            arduino-cli compile --fqbn "${{ matrix.fqbn }}" --library . "${SKETCH}"
          done

  build_ssh_megaavr_wifi:
    name: Compile SSH example (UNO WiFi Rev2 + WiFiNINA)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Arduino CLI
        uses: arduino/setup-arduino-cli@v2
        with:
          version: "1.x"
      - name: Install MegaAVR core and WiFiNINA library
        run: |
          arduino-cli core update-index
          arduino-cli core install arduino:megaavr
          arduino-cli lib install WiFiNINA
      - name: Compile SSH example for UNO WiFi Rev2
        run: |
          arduino-cli compile \
            --fqbn arduino:megaavr:uno2018 \
            --build-property compiler.cpp.extra_flags="-DANSITERM_SSH_USE_WIFI_NINA" \
            --library . \
            examples/SSHExample/SSHExample.ino

  build_ssh_avr_ethernet:
    name: Compile SSH example (Mega + Ethernet)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Arduino CLI
        uses: arduino/setup-arduino-cli@v2
        with:
          version: "1.x"
      - name: Install AVR core and Ethernet library
        run: |
          arduino-cli core update-index
          arduino-cli core install arduino:avr
          arduino-cli lib install Ethernet
      - name: Compile SSH example for Mega with Ethernet
        run: |
          arduino-cli compile \
            --fqbn arduino:avr:mega \
            --build-property compiler.cpp.extra_flags="-DANSITERM_SSH_USE_ETHERNET" \
            --library . \
            examples/SSHExample/SSHExample.ino
