name: Arduino CI

on:
  push:
    branches: [master, main]
    tags: ['v*']
  pull_request:
    branches: [master, main]

concurrency:
  group: arduino-ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  ARDUINO_CLI_VERSION: '1.x'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: arduino/arduino-lint-action@v2
        with:
          compliance: strict
          library-manager: update

  build_avr:
    name: AVR (${{ matrix.fqbn }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        fqbn:
          - arduino:avr:uno
          - arduino:avr:leonardo
          - arduino:avr:mega
    steps:
      - uses: actions/checkout@v4
      - uses: arduino/setup-arduino-cli@v2
        with:
          version: ${{ env.ARDUINO_CLI_VERSION }}
      - name: Install core and SD
        run: |
          arduino-cli core update-index
          arduino-cli core install arduino:avr
          arduino-cli lib install SD
      - name: Compile examples
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r sketch; do
            if [[ "${{ matrix.fqbn }}" != arduino:avr:mega && "$sketch" == */ANSFileExample/* ]]; then
              echo "==> Skip $sketch on ${{ matrix.fqbn }} (SRAM)"
              continue
            fi
            echo "==> $sketch"
            arduino-cli compile --fqbn "${{ matrix.fqbn }}" --library . "$sketch"
          done < <(find examples -type f -name '*.ino' \
            ! -path '*/NetworkTerminalExample/*' \
            ! -path '*/ESPWiFiControlExample/*' \
            | sort)

  build_esp:
    name: ESP (${{ matrix.fqbn }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - fqbn: esp32:esp32:esp32
            url: https://espressif.github.io/arduino-esp32/package_esp32_index.json
            core: esp32:esp32
          - fqbn: esp8266:esp8266:generic
            url: https://arduino.esp8266.com/stable/package_esp8266com_index.json
            core: esp8266:esp8266
    steps:
      - uses: actions/checkout@v4
      - uses: arduino/setup-arduino-cli@v2
        with:
          version: ${{ env.ARDUINO_CLI_VERSION }}
      - name: Install core
        run: |
          arduino-cli core update-index --additional-urls "${{ matrix.url }}"
          arduino-cli core install "${{ matrix.core }}" --additional-urls "${{ matrix.url }}"
      - name: Compile network examples
        shell: bash
        run: |
          set -euo pipefail
          for sketch in \
            examples/ESPWiFiControlExample/ESPWiFiControlExample.ino \
            examples/NetworkTerminalExample/NetworkTerminalExample.ino
          do
            echo "==> $sketch"
            arduino-cli compile --fqbn "${{ matrix.fqbn }}" --library . "$sketch"
          done

  build_network:
    name: Network (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: UNO WiFi Rev2
            fqbn: arduino:megaavr:uno2018
            core: arduino:megaavr
            lib: WiFiNINA
            flags: -DANSITERM_NET_USE_WIFI_NINA
          - name: Mega + Ethernet
            fqbn: arduino:avr:mega
            core: arduino:avr
            lib: Ethernet
            flags: -DANSITERM_NET_USE_ETHERNET
    steps:
      - uses: actions/checkout@v4
      - uses: arduino/setup-arduino-cli@v2
        with:
          version: ${{ env.ARDUINO_CLI_VERSION }}
      - name: Install core and library
        run: |
          arduino-cli core update-index
          arduino-cli core install "${{ matrix.core }}"
          arduino-cli lib install "${{ matrix.lib }}"
      - name: Compile NetworkTerminalExample
        run: |
          arduino-cli compile \
            --fqbn "${{ matrix.fqbn }}" \
            --build-property "compiler.cpp.extra_flags=${{ matrix.flags }}" \
            --library . \
            examples/NetworkTerminalExample/NetworkTerminalExample.ino
