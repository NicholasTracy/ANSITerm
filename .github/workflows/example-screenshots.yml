name: Example screenshots

on:
  pull_request:
    branches: [master, main]
    paths:
      - 'tools/screenshots/**'
      - 'docs/screenshots/**'
      - 'examples/**'
      - '.github/workflows/example-screenshots.yml'
  push:
    branches: [master, main]
    paths:
      - 'tools/screenshots/**'
      - 'docs/screenshots/**'
      - 'examples/**'
      - '.github/workflows/example-screenshots.yml'
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: screenshots-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Check
    if: github.event_name != 'push' || !startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-dejavu-core
          python -m pip install --upgrade pip
          pip install -r tools/screenshots/requirements.txt
      - name: Generate and detect drift
        id: regen
        run: |
          set -euo pipefail
          python tools/screenshots/generate.py
          if git diff --quiet -- docs/screenshots; then
            echo "drift=false" >> "$GITHUB_OUTPUT"
            echo "Screenshots OK."
          else
            echo "drift=true" >> "$GITHUB_OUTPUT"
            git --no-pager diff --stat -- docs/screenshots
          fi
      - name: Upload regenerated screenshots
        if: steps.regen.outputs.drift == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: regenerated-screenshots
          path: docs/screenshots/*
      - name: Sync drifted screenshots via PR
        if: >-
          steps.regen.outputs.drift == 'true' &&
          (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          BRANCH="chore/screenshots-linux-${GITHUB_SHA::7}"
          git checkout -B "$BRANCH"
          git add docs/screenshots
          chmod +x tools/screenshots/ci_open_merge_pr.sh
          tools/screenshots/ci_open_merge_pr.sh \
            --branch "$BRANCH" \
            --title "Sync example screenshots to Linux CI renderer." \
            --body "Regenerated on ubuntu-latest so committed PNG/GIF bytes match CI."
      - name: Fail on PR drift
        if: steps.regen.outputs.drift == 'true' && github.event_name == 'pull_request'
        run: |
          echo "Screenshot drift on this PR. Commit Linux-generated docs/screenshots." >&2
          exit 1

  release:
    name: Release update
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-dejavu-core
          python -m pip install --upgrade pip
          pip install -r tools/screenshots/requirements.txt
      - name: Generate screenshots
        run: |
          set -euo pipefail
          python tools/screenshots/generate.py
          mkdir -p "$RUNNER_TEMP/ansiterm-shots"
          cp -a docs/screenshots/. "$RUNNER_TEMP/ansiterm-shots/"
      - name: Open and merge screenshot PR
        id: shotpr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          BRANCH="chore/screenshots-${TAG}"
          git fetch origin master
          git checkout -B "$BRANCH" origin/master
          mkdir -p docs/screenshots
          cp -a "$RUNNER_TEMP/ansiterm-shots/." docs/screenshots/
          git add docs/screenshots
          chmod +x tools/screenshots/ci_open_merge_pr.sh
          tools/screenshots/ci_open_merge_pr.sh \
            --branch "$BRANCH" \
            --title "Update example screenshots for ${TAG}." \
            --body "Regenerated example previews for release \`${TAG}\`."
      - name: Sync Wiki embeds
        if: steps.shotpr.outputs.skipped != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python tools/screenshots/sync_wiki.py --tag "${GITHUB_REF_NAME}" --raw-ref master
