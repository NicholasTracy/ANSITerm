name: CodeQL

on:
  pull_request:
    branches: [ master, main ]
  push:
    branches: [ master, main ]
  schedule:
    - cron: '12 6 * * 0'

jobs:
  analyze:
    name: CodeQL (C/C++ via Arduino CLI)
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    env:
      CODEQL_EXTRACTOR_CPP_TRACING: "on"
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: cpp
          build-mode: manual

      - name: Set up Arduino CLI
        uses: arduino/setup-arduino-cli@v2
        with:
          version: "1.x"

      - name: Install Arduino cores and libraries
        run: |
          arduino-cli core update-index
          arduino-cli core install arduino:avr
          arduino-cli core install arduino:megaavr
          arduino-cli lib install SD
          arduino-cli lib install Ethernet
          arduino-cli lib install WiFiNINA
          arduino-cli core update-index --additional-urls https://espressif.github.io/arduino-esp32/package_esp32_index.json
          arduino-cli core install esp32:esp32 --additional-urls https://espressif.github.io/arduino-esp32/package_esp32_index.json
          arduino-cli core update-index --additional-urls https://arduino.esp8266.com/stable/package_esp8266com_index.json
          arduino-cli core install esp8266:esp8266 --additional-urls https://arduino.esp8266.com/stable/package_esp8266com_index.json

      - name: Compile AVR examples (arduino:avr:mega)
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r SKETCH; do
            echo "==> Building $SKETCH"
            arduino-cli compile --fqbn arduino:avr:mega --library . "$SKETCH"
          done < <(find examples -type f -name '*.ino' \
            ! -path '*/NetworkTerminalExample/*' \
            ! -path '*/ESPWiFiControlExample/*' \
            | sort)

      - name: Compile ESP examples (ESP32)
        shell: bash
        run: |
          set -euo pipefail
          for SKETCH in \
            examples/ESPWiFiControlExample/ESPWiFiControlExample.ino \
            examples/NetworkTerminalExample/NetworkTerminalExample.ino
          do
            echo "==> Building $SKETCH for esp32:esp32:esp32"
            arduino-cli compile --fqbn esp32:esp32:esp32 --library . "$SKETCH"
          done

      - name: Compile ESP Wi-Fi control (ESP8266)
        run: |
          arduino-cli compile \
            --fqbn esp8266:esp8266:generic \
            --library . \
            examples/ESPWiFiControlExample/ESPWiFiControlExample.ino

      - name: Compile network example (UNO WiFi Rev2 + WiFiNINA)
        run: |
          arduino-cli compile \
            --fqbn arduino:megaavr:uno2018 \
            --build-property compiler.cpp.extra_flags="-DANSITERM_NET_USE_WIFI_NINA" \
            --library . \
            examples/NetworkTerminalExample/NetworkTerminalExample.ino

      - name: Compile network example (Mega + Ethernet)
        run: |
          arduino-cli compile \
            --fqbn arduino:avr:mega \
            --build-property compiler.cpp.extra_flags="-DANSITERM_NET_USE_ETHERNET" \
            --library . \
            examples/NetworkTerminalExample/NetworkTerminalExample.ino

      - name: Analyze with CodeQL
        uses: github/codeql-action/analyze@v3
