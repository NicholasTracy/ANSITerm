name: CodeQL

on:
  pull_request:
    branches: [master, main]
  push:
    branches: [master, main]
  schedule:
    - cron: '12 6 * * 0'

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    env:
      CODEQL_EXTRACTOR_CPP_TRACING: 'on'
      ARDUINO_CLI_VERSION: '1.x'
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: cpp
          build-mode: manual

      - uses: arduino/setup-arduino-cli@v2
        with:
          version: ${{ env.ARDUINO_CLI_VERSION }}

      - name: Install cores and libraries
        run: |
          set -euo pipefail
          arduino-cli core update-index
          arduino-cli core install arduino:avr arduino:megaavr
          arduino-cli lib install SD Ethernet WiFiNINA
          arduino-cli core update-index --additional-urls \
            https://espressif.github.io/arduino-esp32/package_esp32_index.json
          arduino-cli core install esp32:esp32 --additional-urls \
            https://espressif.github.io/arduino-esp32/package_esp32_index.json

      - name: Build for analysis
        shell: bash
        run: |
          set -euo pipefail
          # Representative builds covering the library and network backends.
          while IFS= read -r sketch; do
            echo "==> $sketch (mega)"
            arduino-cli compile --fqbn arduino:avr:mega --library . "$sketch"
          done < <(find examples -type f -name '*.ino' \
            ! -path '*/NetworkTerminalExample/*' \
            ! -path '*/ESPWiFiControlExample/*' \
            | sort)

          for sketch in \
            examples/ESPWiFiControlExample/ESPWiFiControlExample.ino \
            examples/NetworkTerminalExample/NetworkTerminalExample.ino
          do
            echo "==> $sketch (esp32)"
            arduino-cli compile --fqbn esp32:esp32:esp32 --library . "$sketch"
          done

          arduino-cli compile \
            --fqbn arduino:megaavr:uno2018 \
            --build-property compiler.cpp.extra_flags="-DANSITERM_NET_USE_WIFI_NINA" \
            --library . \
            examples/NetworkTerminalExample/NetworkTerminalExample.ino

          arduino-cli compile \
            --fqbn arduino:avr:mega \
            --build-property compiler.cpp.extra_flags="-DANSITERM_NET_USE_ETHERNET" \
            --library . \
            examples/NetworkTerminalExample/NetworkTerminalExample.ino

      - name: Analyze
        uses: github/codeql-action/analyze@v3
