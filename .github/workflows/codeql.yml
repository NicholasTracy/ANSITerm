name: CodeQL

on:
  pull_request:
    branches: [ master, main ]
  push:
    branches: [ master, main ]
  schedule:
    - cron: '12 6 * * 0'

jobs:
  analyze:
    name: CodeQL (C/C++ via Arduino CLI)
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    env:
      CODEQL_EXTRACTOR_CPP_TRACING: "on"
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: cpp
          build-mode: manual

      - name: Set up Arduino CLI
        uses: arduino/setup-arduino-cli@v2
        with:
          version: "1.x"

      - name: Install Arduino cores and libraries
        run: |
          arduino-cli core update-index
          arduino-cli core install arduino:avr
          arduino-cli core install arduino:megaavr
          arduino-cli lib install SD
          arduino-cli lib install Ethernet
          arduino-cli lib install WiFiNINA
          arduino-cli core update-index --additional-urls https://espressif.github.io/arduino-esp32/package_esp32_index.json
          arduino-cli core install esp32:esp32 --additional-urls https://espressif.github.io/arduino-esp32/package_esp32_index.json

      - name: List example sketches
        id: ex
        shell: bash
        run: |
          EXS=$(find examples -type f -name '*.ino' ! -path '*/SSHExample/*' | sort || true)
          echo "examples<<EOF" >> $GITHUB_OUTPUT
          echo "${EXS}" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "Found sketches:"
          echo "${EXS}"

      - name: Compile examples (arduino:avr:uno)
        if: ${{ steps.ex.outputs.examples != '' }}
        shell: bash
        run: |
          set -e
          while IFS= read -r SKETCH; do
            echo "==> Building $SKETCH"
            arduino-cli compile --fqbn arduino:avr:uno --library . "$SKETCH"
          done <<< "${{ steps.ex.outputs.examples }}"

      - name: Compile SSH example (UNO WiFi Rev2 + WiFiNINA)
        run: |
          arduino-cli compile \
            --fqbn arduino:megaavr:uno2018 \
            --build-property compiler.cpp.extra_flags="-DANSITERM_SSH_USE_WIFI_NINA" \
            --library . \
            examples/SSHExample/SSHExample.ino

      - name: Compile SSH example (Mega + Ethernet)
        run: |
          arduino-cli compile \
            --fqbn arduino:avr:mega \
            --build-property compiler.cpp.extra_flags="-DANSITERM_SSH_USE_ETHERNET" \
            --library . \
            examples/SSHExample/SSHExample.ino

      - name: Compile SSH example (ESP32)
        run: |
          arduino-cli compile \
            --fqbn esp32:esp32:esp32 \
            --library . \
            examples/SSHExample/SSHExample.ino

      - name: Analyze with CodeQL
        uses: github/codeql-action/analyze@v3
